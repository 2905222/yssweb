<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vercel & Git Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #333;
      border-radius: 12px;
      background: #111;
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 span { color: #0070f3; }
    p { color: #888; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: #0070f3;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vercel &amp; <span>Git</span> Test</h1>
    <p>This site is hosted on Vercel.</p>
    <p>Deployed automatically via GitHub.</p>
    <div class="badge">Live on Vercel</div>
  </div>
</body>
</html>
